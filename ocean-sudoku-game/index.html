<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f7f9a" />
  <title>海洋風數獨 Ocean Sudoku</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="hero card">
      <div>
        <p class="eyebrow">Ocean Sudoku</p>
        <h1>海洋風數獨</h1>
        <p class="subtitle">自動產生唯一解題目，支援分享同一題網址、手機、鍵盤、筆記、提示與難度選擇。</p>
      </div>
      <div class="controls" aria-label="遊戲控制">
        <label class="select-wrap">
          <span>難度</span>
          <select id="difficulty" aria-label="選擇難度">
            <option value="easy">簡單</option>
            <option value="medium" selected>中等</option>
            <option value="hard">困難</option>
            <option value="expert">專家</option>
          </select>
        </label>
        <button id="newGameBtn" class="primary">新題目</button>
        <button id="shareBtn" class="secondary" type="button">分享同一題</button>
      </div>
    </header>

    <main class="game-layout">
      <section class="board-panel card" aria-label="數獨遊戲區">
        <div class="stats" aria-live="polite">
          <div><span class="stat-label">時間</span><strong id="timer">00:00</strong></div>
          <div><span class="stat-label">錯誤</span><strong id="mistakes">0</strong></div>
          <div><span class="stat-label">提示</span><strong id="hints">0</strong></div>
        </div>

        <div id="board" class="board" role="grid" aria-label="9乘9數獨盤面"></div>

        <div class="message" id="message">選一格，再輸入數字。</div>
      </section>

      <aside class="side-panel card" aria-label="操作面板">
        <div class="tool-grid">
          <button id="noteBtn" class="tool" aria-pressed="false">筆記模式</button>
          <button id="eraseBtn" class="tool">清除</button>
          <button id="hintBtn" class="tool">提示</button>
          <button id="checkBtn" class="tool">檢查</button>
        </div>

        <div class="number-pad" id="numberPad" aria-label="數字鍵盤"></div>

        <details class="help">
          <summary>玩法說明</summary>
          <p>每一列、每一行、每個 3×3 宮格都必須填入 1～9，且不能重複。</p>
          <p>快捷鍵：1～9 輸入，Backspace 清除，N 切換筆記，H 使用提示。按「分享同一題」可複製含題目種子的網址，朋友打開後會看到同一題。</p>
        </details>
      </aside>
    </main>
  </div>

  <div id="loading" class="overlay" hidden>
    <div class="loader card" role="status" aria-live="assertive">
      <div class="wave" aria-hidden="true"></div>
      <h2>正在產生唯一解題目...</h2>
      <p>海浪正在洗出一題新的數獨。</p>
    </div>
  </div>

  <dialog id="winDialog" class="dialog">
    <h2>完成！</h2>
    <p id="winText">你成功解開這題數獨。</p>
    <form method="dialog">
      <button class="primary">繼續</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
